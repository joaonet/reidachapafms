<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei da Chapa | Cardápio Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #fdf2e9; }
        .primary-gradient { background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: #000; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 10px; font-weight: bold; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .method-btn.active { background-color: #f59e0b; color: white; border-color: #f59e0b; }
        
        .img-container {
            display: flex; align-items: center; justify-content: center;
            background-color: #fff; overflow: hidden; height: 180px; position: relative;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .category-bebidas .img-container img { object-fit: contain; padding: 12px; }

        .ilustrativa-tag {
            position: absolute; bottom: 3px; right: 5px; color: #fff9c4; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3); font-size: 7px;
            pointer-events: none; text-transform: lowercase; font-weight: 500;
        }

        /* Estilos do Painel Admin */
        .admin-card-open { background-color: #dcfce7; border-color: #22c55e; }
        .admin-card-closed { background-color: #fee2e2; border-color: #ef4444; }
        
        .btn-status-off { background-color: #e2e8f0; color: #64748b; border: 2px solid #cbd5e1; }
        .btn-status-open-on { background-color: #22c55e; color: white; border: 2px solid #16a34a; box-shadow: 0 4px 10px rgba(34, 197, 94, 0.3); }
        .btn-status-closed-on { background-color: #ef4444; color: white; border: 2px solid #dc2626; box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="text-gray-800">

    <nav class="bg-white shadow-sm sticky top-0 z-50 border-b-4 border-yellow-500">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-yellow-500 rounded-full flex items-center justify-center text-white shadow-lg">
                    <i class="fas fa-crown"></i>
                </div>
                <h1 class="text-xl font-black text-gray-900 uppercase tracking-tighter">Rei da <span class="text-yellow-500">Chapa</span></h1>
            </div>
            <button onclick="toggleCart()" class="relative p-2 bg-gray-100 rounded-xl text-gray-800 hover:bg-yellow-100 transition-colors">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="cart-badge hidden">0</span>
            </button>
        </div>
    </nav>

    <header class="primary-gradient text-white py-8 px-4 text-center relative overflow-hidden">
        <div class="relative z-10">
            <h2 class="text-3xl font-black mb-1 drop-shadow-lg italic uppercase">Rei da Chapa</h2>
            <p class="text-[10px] font-bold bg-black/20 inline-block px-3 py-1 rounded-full uppercase tracking-widest">O Sabor que manda!</p>
        </div>
        <i class="fas fa-fire absolute -right-10 -bottom-10 text-[140px] text-white/10 rotate-12"></i>
    </header>

    <div class="container mx-auto px-4 mt-4">
        <div class="bg-white rounded-2xl p-4 shadow-sm border-l-4 border-yellow-500 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="text-yellow-600 bg-yellow-100 p-2 rounded-lg"><i class="fas fa-clock"></i></div>
                <div>
                    <h4 class="text-[10px] font-black uppercase text-gray-900">Atendimento</h4>
                    <p class="text-[9px] font-bold text-gray-500 uppercase">Entrega / Retirada</p>
                </div>
            </div>
            <div class="text-right">
                <span id="status-loja" class="text-[10px] font-black px-2 py-1 rounded-md uppercase italic">Verificando...</span>
                <p id="display-horario" class="text-xs font-black text-gray-800 mt-1">18:00 às 22:30</p>
            </div>
        </div>
    </div>

    <div class="sticky top-[68px] bg-white/90 backdrop-blur-md z-40 py-3 shadow-sm mt-4">
        <div class="flex overflow-x-auto px-4 gap-2 no-scrollbar">
            <button id="btn-Sanduiches" onclick="filterCategory('Sanduiches')" class="cat-btn bg-yellow-500 text-white px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap shadow-md">Sanduíches</button>
            <button id="btn-Artesanais" onclick="filterCategory('Artesanais')" class="cat-btn bg-white border border-gray-200 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">Artesanais</button>
            <button id="btn-Bebidas" onclick="filterCategory('Bebidas')" class="cat-btn bg-white border border-gray-200 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap">Bebidas</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-4 mb-20">
        <div id="products-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <div id="admin-modal" class="fixed inset-0 bg-black/80 z-[200] hidden flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl">
            <div class="p-5 bg-gray-900 text-white flex justify-between items-center">
                <h3 class="font-black uppercase text-sm italic tracking-widest"><i class="fas fa-user-shield mr-2 text-yellow-500"></i> Painel Admin</h3>
                <button onclick="closeAdmin()"><i class="fas fa-times"></i></button>
            </div>
            
            <div id="admin-container" class="p-6 space-y-6 transition-colors duration-300">
                <div class="space-y-3">
                    <p class="text-[10px] font-black text-gray-400 uppercase text-center italic mb-2">Selecione o Status da Loja</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button id="admin-btn-aberto" onclick="setAdminStatus('aberto')" class="py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all">
                            <i class="fas fa-door-open text-lg"></i>
                            Aberto
                        </button>
                        <button id="admin-btn-fechado" onclick="setAdminStatus('fechado')" class="py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all">
                            <i class="fas fa-door-closed text-lg"></i>
                            Fechado
                        </button>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="font-bold text-[10px] uppercase text-gray-400 ml-1 italic">Horário de Funcionamento</label>
                    <input type="text" id="admin-input-horario" class="w-full bg-white/50 border-2 border-gray-200 focus:border-yellow-500 rounded-xl p-3 text-sm font-bold outline-none transition-all" placeholder="Ex: 18:00 às 23:00">
                </div>

                <button onclick="saveAdminChanges()" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg active:scale-95 transition-all">
                    Confirmar Alterações
                </button>
            </div>
        </div>
    </div>

    <div id="options-modal" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl flex flex-col max-h-[85vh] relative">
            <div class="p-5 bg-yellow-500 text-white font-black uppercase italic flex justify-between items-center shrink-0">
                <span id="modal-title" class="text-sm">Personalizar</span>
                <button onclick="closeOptions()"><i class="fas fa-times"></i></button>
            </div>
            <div class="p-6 space-y-3 overflow-y-auto pb-24" id="options-container"></div>
            <div class="absolute bottom-6 left-0 w-full px-6">
                <button id="confirm-addons" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-black uppercase shadow-xl flex items-center justify-center gap-2">
                    <i class="fas fa-check"></i> Confirmar
                </button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed inset-y-0 right-0 w-full md:w-[400px] bg-white shadow-2xl z-[60] transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 bg-gray-900 text-white flex justify-between items-center">
            <h2 class="text-lg font-black italic uppercase text-yellow-500">Seu Pedido</h2>
            <button onclick="toggleCart()" class="text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>
        <div class="flex-grow overflow-y-auto p-4 space-y-4 bg-gray-50">
            <div id="cart-items" class="space-y-2"></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 space-y-3">
                <div class="flex gap-2 p-1 bg-gray-100 rounded-xl">
                    <button id="btn-delivery" onclick="setMethod('Entrega')" class="method-btn active flex-1 py-2 rounded-lg font-bold text-[10px]">ENTREGA</button>
                    <button id="btn-pickup" onclick="setMethod('Retirada')" class="method-btn flex-1 py-2 rounded-lg font-bold text-[10px]">RETIRADA</button>
                </div>
                <input type="text" id="cust-name" placeholder="Seu Nome" class="w-full bg-gray-100 border-none rounded-xl p-3 text-sm">
                <div id="address-box">
                    <textarea id="cust-address" placeholder="Endereço Completo" class="w-full bg-gray-100 border-none rounded-xl p-3 text-sm h-20"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="cust-payment" class="w-full bg-gray-100 border-none rounded-xl p-3 text-sm">
                        <option value="Pix">Pix</option>
                        <option value="Cartão">Cartão</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                    <input type="text" id="cust-change" placeholder="Troco?" class="w-full bg-gray-100 border-none rounded-xl p-3 text-sm">
                </div>
            </div>
        </div>
        <div class="p-6 border-t bg-white">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-500 font-bold uppercase text-[10px]">Total</span>
                <span id="cart-total" class="text-2xl font-black text-orange-600">R$ 0,00</span>
            </div>
            <button onclick="sendOrder()" class="w-full primary-gradient text-white py-4 rounded-2xl font-black uppercase shadow-xl flex items-center justify-center gap-3">
                <i class="fab fa-whatsapp text-xl"></i> Finalizar Pedido
            </button>
        </div>
    </div>

    <footer class="p-10 text-center">
        <button onclick="authAdmin()" class="text-gray-300 hover:text-yellow-600 transition-all">
            <i class="fas fa-cog text-xl"></i>
        </button>
    </footer>

    <div id="overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55] hidden"></div>

    <script>
        const WHATSAPP_NUMBER = "61999179675";
        const ADMIN_PASS = "Fazenda51@"; 
        
        let orderMethod = "Entrega";
        let cart = [];
        let currentCategory = 'Sanduiches';
        let tempAdminStatus = 'aberto'; // Para controle no modal

        const addonsList = [
            { name: "Cheddar", price: 3.00 },
            { name: "Catupiry", price: 3.00 },
            { name: "Bacon", price: 3.00 },
            { name: "Hambúrguer", price: 3.00 }
        ];

        const products = [
            { id: 1, name: "Príncipe da Chapa", price: 13.00, desc: "Hambúrguer, Presunto e Queijo.", category: "Sanduiches", img: "https://www.estadao.com.br/resizer/aQ0_ezgaRvEwF__UfwM-NAkqAsc=/720x503/filters:format(jpg):quality(80):focal(540x315:550x325)/cloudfront-us-east-1.images.arcpublishing.com/estadao/77XTHHCCLBEXLC2Y5RK4PN37CE.jpg", hasAddons: true },
            { id: 2, name: "Rei Clássico", price: 15.00, desc: "Hambúrguer, presunto, Queijo, Alface, Tomate e Ovo.", category: "Sanduiches", img: "https://img.freepik.com/fotos-premium/hamburguer-delicioso-em-fundo-de-madeira-hamburguer-com-carne-de-alface-tomate-e-queijo_433165-4.jpg", hasAddons: true },
            { id: 3, name: "Bacon Imperial", price: 18.00, desc: "Hambúrguer, Presunto, Queijo, Ovo, Milho, Alface, Tomate e Bacon.", category: "Sanduiches", img: "https://static.wixstatic.com/media/114454_758f742acd454b6abe9c56faa1eb618a~mv2.jpg/v1/fill/w_980,h_756,al_c,q_85,usm_0.66_1.00_0.01,enc_auto/114454_758f742acd454b6abe9c56faa1eb618a~mv2.jpg", hasAddons: true },
            { id: 4, name: "Imperial Chicken", price: 21.00, desc: "Filé de frango, Presunto, Queijo, Milho, Ovo, Alface e Tomate.", category: "Sanduiches", img: "https://revistamenu.com.br/wp-content/uploads/sites/24/2024/06/grand-chicken.jpg", hasAddons: true },
            { id: 5, name: "Duelo Real", price: 23.00, desc: "Hambúrguer, Filé de frango, Presunto, Queijo, Bacon, Ovo, Alface e Tomate.", category: "Sanduiches", img: "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?q=80&w=500", hasAddons: true },
            { id: 6, name: "Imperador Mignon", price: 26.00, desc: "Filé mignon, Presunto, Queijo, Milho, Ovo, Alface, Tomate.", category: "Sanduiches", img: "https://images.unsplash.com/photo-1521305916504-4a1121188589?q=80&w=500", hasAddons: true },
            { id: 16, name: "Rei Bacana", price: 35.00, desc: "Pão, Alface, Hambúrguer Artesanal, Bacon, Ovo, Presunto, Mussarela, Tomate e Pickles.", category: "Artesanais", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500", hasAddons: true },
            { id: 7, name: "Rei Insano", price: 27.00, desc: "Hambúrguer Artesanal, Filé de frango, Calabresa, Bacon, Presunto, Queijo, Ovo, Batata, Milho, Alface e Tomate.", category: "Artesanais", img: "https://tse4.mm.bing.net/th/id/OIP.0kbGCSI19_hbJBNLmOWN1gHaHa?rs=1&pid=ImgDetMain&o=7&rm=3", hasAddons: true },
            { id: 8, name: "Soberano Artesanal", price: 32.00, desc: "Dois hambúrgueres artesanais, Presunto, Queijo, Milho, Ovo, Batata, Alface, Tomate e Bacon.", category: "Artesanais", img: "https://tse3.mm.bing.net/th/id/OIP._ukZ8NYAT2Js62cjAzqawgHaGh?rs=1&pid=ImgDetMain&o=7&rm=3", hasAddons: true },
            { id: 9, name: "Rei dos Reis", price: 37.00, desc: "2 Hambúrgueres Artesanais, Filé de frango, 2 Ovos, Calabresa, Bacon, Presunto, Queijo, Alface e Tomate.", category: "Artesanais", img: "https://imagens.jotaja.com/produtos/d4a28843-7b32-4f40-bce6-c491f8851421.jpg", hasAddons: true },
            { id: 10, name: "Cerveja lata", price: 4.50, desc: "Skol, Brahma ou Antarctica.", category: "Bebidas", img: "https://amazonasatual.com.br/wp-content/uploads/2021/12/Cervejas-em-lata-Divulgacao-800x530.jpg", options: ["Skol", "Brahma", "Antarctica"] },
            { id: 11, name: "Refrigerante lata", price: 4.50, desc: "Coca, Guaraná ou Fanta.", category: "Bebidas", img: "https://lanchonautas.com.br/wp-content/uploads/2022/05/refrilata-1.png", options: ["Coca-Cola", "Guaraná", "Fanta"] },
            { id: 13, name: "Coca Cola 1,5L", price: 10.50, desc: "Garrafa gelada.", category: "Bebidas", img: "https://tdc0wy.vteximg.com.br/arquivos/ids/159102-1000-1000/REFRIGERANTE-COCA-COLA-PET-15L-ORIGINAL.png?v=638121787162800000" },
            { id: 12, name: "Suco Maracujá", price: 10.70, desc: "Del Valle 1 Litro.", category: "Bebidas", img: "https://www.bernardaoemcasa.com.br/media/catalog/product/cache/1/image/500x500/9df78eab33525d08d6e5fb8d27136e95/3/d/3d_front_view_v1_del_valle_nectar_maracuja_tetrabrik_1000ml_1573_mainline_seca.png" },
            { id: 14, name: "Suco Pêssego", price: 10.70, desc: "Del Valle 1 Litro.", category: "Bebidas", img: "https://http2.mlstatic.com/D_NQ_NP_2X_778083-MLA92206226691_092025-F.webp" },
            { id: 15, name: "Suco Uva", price: 10.70, desc: "Del Valle 1 Litro.", category: "Bebidas", img: "https://mercantilnovaera.vtexassets.com/arquivos/ids/220480-1200-auto?v=638798909754400000&width=1200&height=auto&aspect=true" }
        ];

        // --- LÓGICA ADMINISTRADOR ---
        function authAdmin() {
            const pass = prompt("Senha do Admin:");
            if (pass === ADMIN_PASS) {
                const modal = document.getElementById('admin-modal');
                tempAdminStatus = localStorage.getItem('rei_status') || 'aberto';
                document.getElementById('admin-input-horario').value = localStorage.getItem('rei_horario') || "18:00 às 22:30";
                setAdminStatus(tempAdminStatus); 
                modal.classList.remove('hidden');
            } else if (pass) { alert("Senha incorreta!"); }
        }

        function setAdminStatus(status) {
            tempAdminStatus = status;
            const btnAberto = document.getElementById('admin-btn-aberto');
            const btnFechado = document.getElementById('admin-btn-fechado');
            const container = document.getElementById('admin-container');

            if (status === 'aberto') {
                btnAberto.className = "py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all btn-status-open-on";
                btnFechado.className = "py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all btn-status-off";
                container.className = "p-6 space-y-6 transition-colors duration-300 admin-card-open";
            } else {
                btnAberto.className = "py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all btn-status-off";
                btnFechado.className = "py-4 rounded-2xl font-black uppercase text-sm flex flex-col items-center gap-1 transition-all btn-status-closed-on";
                container.className = "p-6 space-y-6 transition-colors duration-300 admin-card-closed";
            }
        }

        function saveAdminChanges() {
            const horario = document.getElementById('admin-input-horario').value;
            localStorage.setItem('rei_status', tempAdminStatus);
            localStorage.setItem('rei_horario', horario);
            updateStatusUI();
            alert("Cardápio Atualizado com Sucesso!");
            closeAdmin();
        }

        function updateStatusUI() {
            const status = localStorage.getItem('rei_status') || 'aberto';
            const horario = localStorage.getItem('rei_horario') || '18:00 às 22:30';
            const tag = document.getElementById('status-loja');
            document.getElementById('display-horario').innerText = horario;
            if (status === 'aberto') {
                tag.innerText = "Aberto";
                tag.className = "bg-green-100 text-green-700 text-[9px] font-black px-2 py-1 rounded-md uppercase italic";
            } else {
                tag.innerText = "Fechado";
                tag.className = "bg-red-100 text-red-700 text-[9px] font-black px-2 py-1 rounded-md uppercase italic";
            }
        }

        // --- SISTEMA DO CARDÁPIO ---
        function renderProducts() {
            const grid = document.getElementById('products-list');
            grid.className = `grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 category-${currentCategory.toLowerCase()}`;
            const filtered = products.filter(p => p.category === currentCategory);
            grid.innerHTML = filtered.map(p => `
                <div class="product-card bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-full">
                    <div class="img-container">
                        <img src="${p.img}">
                        <span class="ilustrativa-tag">imagem meramente ilustrativa</span>
                    </div>
                    <div class="p-4 flex-grow">
                        <div class="flex justify-between items-start mb-1 gap-2">
                            <h3 class="font-black text-gray-900 uppercase text-sm leading-tight">${p.name}</h3>
                            <span class="text-orange-600 font-black text-md">R$ ${p.price.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <p class="text-gray-500 text-[10px] leading-tight mb-3">${p.desc}</p>
                    </div>
                    <div class="px-4 pb-4 mt-auto">
                        <button onclick="openProductLogic(${p.id})" class="w-full bg-gray-900 text-white py-2.5 rounded-xl font-black text-[10px] uppercase shadow">
                            + Adicionar
                        </button>
                    </div>
                </div>`).join('');
        }

        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                const isSelected = btn.id === `btn-${cat}`;
                btn.className = isSelected ? "cat-btn bg-yellow-500 text-white px-5 py-2 rounded-full text-xs font-bold shadow-md whitespace-nowrap" : "cat-btn bg-white border border-gray-200 px-5 py-2 rounded-full text-xs font-bold whitespace-nowrap";
            });
            renderProducts();
        }

        function openProductLogic(pid) {
            const p = products.find(x => x.id === pid);
            const container = document.getElementById('options-container');
            const confirmBtn = document.getElementById('confirm-addons');
            confirmBtn.classList.remove('hidden');

            if (p.hasAddons) {
                document.getElementById('modal-title').innerText = "Adicionais";
                container.innerHTML = addonsList.map(a => `
                    <label class="flex justify-between items-center p-3 bg-gray-50 rounded-xl cursor-pointer mb-1">
                        <div class="flex items-center gap-2">
                            <input type="checkbox" class="w-4 h-4 accent-yellow-500" onchange="toggleAddon('${a.name}', ${a.price})">
                            <span class="text-xs font-bold">${a.name}</span>
                        </div>
                        <span class="text-[10px] font-black text-orange-600">+ R$ ${a.price.toFixed(2)}</span>
                    </label>`).join('');
                confirmBtn.onclick = () => {
                    let totalP = p.price + (window.currentAddons || []).reduce((acc, x) => acc + x.price, 0);
                    let name = p.name + (window.currentAddons?.length ? " (+" + window.currentAddons.map(x=>x.name).join(", ") + ")" : "");
                    cart.push({...p, name, price: totalP, cartId: Date.now(), qty: 1});
                    closeOptions(); updateCart();
                };
                document.getElementById('options-modal').classList.remove('hidden');
            } else if (p.options) {
                document.getElementById('modal-title').innerText = "Escolha o Sabor";
                confirmBtn.classList.add('hidden');
                container.innerHTML = p.options.map(o => `
                    <button onclick="addWithOption(${p.id}, '${o}')" class="w-full p-4 bg-gray-50 rounded-xl text-left font-bold text-xs flex justify-between mb-1">
                        ${o} <i class="fas fa-chevron-right text-yellow-500"></i>
                    </button>`).join('');
                document.getElementById('options-modal').classList.remove('hidden');
            } else {
                cart.push({...p, qty: 1, cartId: Date.now()});
                updateCart();
            }
        }

        function toggleAddon(n, p) {
            if(!window.currentAddons) window.currentAddons = [];
            const i = window.currentAddons.findIndex(a => a.name === n);
            if (i > -1) window.currentAddons.splice(i, 1); else window.currentAddons.push({name: n, price: p});
        }

        function addWithOption(pid, opt) {
            const p = products.find(x => x.id === pid);
            cart.push({...p, name: `${p.name} [${opt}]`, qty: 1, cartId: Date.now()});
            closeOptions(); updateCart();
        }

        function updateCart() {
            const totalQty = cart.reduce((acc, i) => acc + i.qty, 0);
            const totalP = cart.reduce((acc, i) => acc + (i.price * i.qty), 0);
            document.getElementById('cart-count').innerText = totalQty;
            document.getElementById('cart-count').classList.toggle('hidden', totalQty === 0);
            document.getElementById('cart-total').innerText = `R$ ${totalP.toFixed(2).replace('.', ',')}`;
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="bg-white p-3 rounded-xl flex items-center justify-between border border-gray-100">
                    <div class="flex-grow">
                        <h4 class="text-[9px] font-black uppercase text-gray-800 leading-tight">${i.name}</h4>
                        <p class="text-orange-600 font-bold text-[9px]">R$ ${i.price.toFixed(2).replace('.', ',')}</p>
                    </div>
                    <div class="flex items-center gap-2 bg-gray-100 rounded-lg p-1">
                        <button onclick="changeQty(${i.cartId}, -1)" class="w-5 h-5 font-bold">-</button>
                        <span class="text-[10px] font-black w-4 text-center">${i.qty}</span>
                        <button onclick="changeQty(${i.cartId}, 1)" class="w-5 h-5 font-bold">+</button>
                    </div>
                </div>`).join('');
        }

        function changeQty(id, d) {
            const i = cart.find(x => x.cartId === id);
            if (i) { i.qty += d; if (i.qty <= 0) cart = cart.filter(x => x.cartId !== id); }
            updateCart();
        }

        function closeOptions() { document.getElementById('options-modal').classList.add('hidden'); window.currentAddons = []; }
        function closeAdmin() { document.getElementById('admin-modal').classList.add('hidden'); }
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
            document.getElementById('overlay').classList.toggle('hidden');
        }

        function setMethod(m) {
            orderMethod = m;
            document.getElementById('btn-delivery').classList.toggle('active', m === 'Entrega');
            document.getElementById('btn-pickup').classList.toggle('active', m === 'Retirada');
            document.getElementById('address-box').style.display = m === 'Entrega' ? 'block' : 'none';
        }

        function sendOrder() {
            if (localStorage.getItem('rei_status') === 'fechado') { alert("Estamos fechados no momento!"); return; }
            const name = document.getElementById('cust-name').value;
            const addr = document.getElementById('cust-address').value;
            const pay = document.getElementById('cust-payment').value;
            if(!name || (orderMethod==='Entrega' && !addr) || cart.length===0) { alert("Preencha todos os campos!"); return; }

            let msg = `👑 *REI DA CHAPA*\n------------------------------\n*CLIENTE:* ${name}\n*TIPO:* ${orderMethod.toUpperCase()}\n`;
            if(orderMethod === 'Entrega') msg += `*ENDEREÇO:* ${addr}\n`;
            msg += `------------------------------\n*PEDIDO:*\n`;
            cart.forEach(i => msg += `• ${i.qty}x ${i.name} - R$ ${(i.price * i.qty).toFixed(2)}\n`);
            msg += `------------------------------\n💰 *TOTAL:* ${document.getElementById('cart-total').innerText}\n*PAGAMENTO:* ${pay}`;
            window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(msg)}`);
        }

        window.onload = () => { updateStatusUI(); renderProducts(); };
    </script>
</body>
</html>
